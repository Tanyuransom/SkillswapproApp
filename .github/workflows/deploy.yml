name: Deploy Backend to Contabo VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via Native SSH
        run: |
          # 1. Prepare SSH directory and decode the Base64 key
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          
          # 2. Clean up host and user secrets
          HOST=$(echo "${{ secrets.VPS_HOST }}" | xargs)
          USER=$(echo "${{ secrets.VPS_USER }}" | xargs)
          
          # 3. Scan host and run deployment
          ssh-keyscan -H $HOST >> ~/.ssh/known_hosts
          ssh -i ~/.ssh/id_ed25519 $USER@$HOST "cd /opt/skillprof && git pull origin main && cd backend && docker-compose up -d --build"
