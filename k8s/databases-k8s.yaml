## Identity DB
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: identity-db-pvc
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: identity-db
  template:
    metadata:
      labels:
        app: identity-db
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          env:
            - name: POSTGRES_USER
              value: skilluser
            - name: POSTGRES_PASSWORD
              value: skillpassword
            - name: POSTGRES_DB
              value: identity_db
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: pgdata
          persistentVolumeClaim:
            claimName: identity-db-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: identity-db
spec:
  ports:
    - port: 5432
  selector:
    app: identity-db
---
