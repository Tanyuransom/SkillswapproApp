## Identity Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-service
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: identity-service
  template:
    metadata:
      labels:
        app: identity-service
    spec:
      containers:
        - name: identity-service
          image: tanyuransom/skillprof-identity-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: DATABASE_URL
              value: "postgres://skilluser:skillpassword@identity-db:5432/identity_db"
            - name: JWT_SECRET
              value: "yoursecretkey"
            - name: GOOGLE_CLIENT_ID
              value: "103593137684-3uitoc6guj875oiks3r89s5i0kbp19oh.apps.googleusercontent.com"
---
apiVersion: v1
kind: Service
metadata:
  name: identity-service
  namespace: default
spec:
  ports:
    - port: 3001
      targetPort: 3001
  selector:
    app: identity-service
---
